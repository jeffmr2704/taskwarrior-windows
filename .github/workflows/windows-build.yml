name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    env:
      CARGO_HOME: "C:\\c_h"
      CARGO_TARGET_DIR: "C:\\tw_t"
      CFLAGS: "/std:c11 /experimental:c11atomics"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable Long Paths
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          git config --global core.longpaths true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            C:\c_h
            C:\tw_t
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Create Short Directories
        run: |
          mkdir C:\c_h -ErrorAction SilentlyContinue
          mkdir C:\tw_t -ErrorAction SilentlyContinue
          mkdir C:\tw_b -ErrorAction SilentlyContinue

      - name: Configure CMake
        run: |
          cmake -S . -B C:\tw_b -G "Visual Studio 17 2022" -A x64

      - name: Build Taskwarrior
        run: |
          cmake --build C:\tw_b --config Release --target task_executable

      - name: Verify and Upload Artifact
        run: |
          $taskExe = Get-ChildItem -Path C:\tw_b -Filter task.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $taskExe) { throw "task.exe not found!" }
          Write-Output "Found task.exe at: $taskExe"
          $version = & $taskExe --version
          Write-Output "Taskwarrior version: $version"
          echo "TASK_EXE_PATH=$taskExe" >> $env:GITHUB_ENV
          echo "TASK_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskwarrior-windows-x64
          path: ${{ env.TASK_EXE_PATH }}

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TASK_VERSION }}-${{ github.run_number }}
          name: Taskwarrior Windows ${{ env.TASK_VERSION }} (Build ${{ github.run_number }})
          files: ${{ env.TASK_EXE_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
